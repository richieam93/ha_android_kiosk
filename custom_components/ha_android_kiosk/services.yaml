      example: cover
    position:
      name: Position
      description: CSS background-position.
      example: center
    repeat:
      name: Repeat
      description: CSS background-repeat.
      example: no-repeat
    opacity:
      name: Opacity
      description: Deckkraft in Prozent.
      example: 100

clear_background:
  name: Clear background
  description: Entfernt den vom Kiosk gesetzten dynamischen Hintergrund.
  fields:
    device:
      name: Device
      description: Geräte-ID, Gerätename, Liste oder "all".
      example: tablet_bad
