alias: Kiosk - Morgenanzeige mit Wetter und Status
mode: single
trigger:
  - platform: time
    at: "07:00:00"
action:
  - service: ha_android_kiosk.show_overlay_sequence
    data:
      device: bad_tablet
      default_duration: 8
      gap: 1
      steps:
        - type: banner
          title: "Guten Morgen"
          message: "Hier ist dein Tagesstart"
          color: "#2563eb"
          text_color: "#ffffff"
          position: top
        - type: weather
          entity_id: weather.home
          title: "Wetter heute"
          position: top-left
          layout: full
          show_forecast: true
          duration: 12
        - type: status_overlay
          title: "Wichtige Werte"
          entities:
            - sensor.aussentemperatur
            - sensor.strompreis
            - sensor.pv_leistung
          duration: 12
